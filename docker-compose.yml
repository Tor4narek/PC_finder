services:
  app:
    build: .
    container_name: pc_finder_app
    env_file:
      - .env
    ports:
      - "${PORT:-8000}:8000"
    volumes:
      - app_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 15s

volumes:
  app_data:
