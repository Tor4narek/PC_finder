{% extends 'base.html' %}
{% block content %}
<h1>{{ title }}</h1>
<p class="muted">Выберите категорию или опишите задачу свободным текстом.</p>

<div class="grid categories">
  {% for code, label in categories.items() %}
    <a class="btn" href="/catalog?category={{ code }}">{{ label }}</a>
  {% endfor %}
</div>

<div class="card">
  <label for="query">Опишите ваши задачи</label>
  <textarea id="query" placeholder="Нужен компьютер для Word и браузера"></textarea>
  <button id="classifyBtn" class="btn primary">Определить категорию и показать ПК</button>
  <p id="classifyResult" class="muted"></p>
</div>
{% endblock %}
