{% extends 'base.html' %}
{% block content %}
<h1>{{ title }}</h1>
<p class="muted">Pick category or describe your task in free text.</p>

<div class="grid categories">
  {% for code, label in categories.items() %}
    <a class="btn" href="/catalog?category={{ code }}">{{ label }}</a>
  {% endfor %}
</div>

<div class="card">
  <label for="query">Describe your needs</label>
  <textarea id="query" placeholder="I need a computer for Word and browser"></textarea>
  <button id="classifyBtn" class="btn primary">Classify & Show PCs</button>
  <p id="classifyResult" class="muted"></p>
</div>
{% endblock %}
