{% extends 'base.html' %}
{% block content %}
<h1>{{ 'Edit' if action == 'edit' else 'Create' }} Computer</h1>
<p><a href="/admin/computers">← Back to admin list</a></p>
<form method="post" class="card" action="{% if action == 'edit' %}/admin/computers/{{ computer.id }}/edit{% else %}/admin/computers/new{% endif %}">
  <label>Name</label><input name="name" value="{{ computer.name if computer else '' }}" required />
  <label>Description</label><textarea name="description" required>{{ computer.description if computer else '' }}</textarea>
  <label>Price</label><input name="price" type="number" step="0.01" value="{{ computer.price if computer else '' }}" required />
  <label>CPU</label><input name="cpu" value="{{ computer.cpu if computer else '' }}" required />
  <label>GPU</label><input name="gpu" value="{{ computer.gpu if computer else '' }}" />
  <label>RAM (GB)</label><input name="ram_gb" type="number" value="{{ computer.ram_gb if computer else '' }}" required />
  <label>SSD (GB)</label><input name="ssd_gb" type="number" value="{{ computer.ssd_gb if computer else '' }}" required />
  <label>Image URL</label><input name="image_url" type="url" value="{{ computer.image_url if computer else '' }}" required />
  <label>Shop Name</label><input name="shop_name" value="{{ computer.shop_name if computer else '' }}" required />
  <label>Shop URL</label><input name="shop_url" type="url" value="{{ computer.shop_url if computer else '' }}" required />
  <label>Category</label>
  <select name="category_code" required>
    {% for code in categories %}
      <option value="{{ code }}" {% if computer and computer.category_code == code %}selected{% endif %}>{{ code }}</option>
    {% endfor %}
  </select>
  <label><input type="checkbox" name="has_windows" {% if not computer or computer.has_windows %}checked{% endif %} /> Has Windows</label>
  <label><input type="checkbox" name="is_active" {% if not computer or computer.is_active %}checked{% endif %} /> Is active</label>
  <button class="btn primary" type="submit">Save</button>
</form>
{% endblock %}
