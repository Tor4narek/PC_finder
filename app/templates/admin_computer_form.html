{% extends 'base.html' %}
{% block content %}
<h1>{{ 'Редактировать' if action == 'edit' else 'Создать' }} компьютер</h1>
<p><a href="/admin/computers">← Назад к списку</a></p>
<form method="post" class="card" action="{% if action == 'edit' %}/admin/computers/{{ computer.id }}/edit{% else %}/admin/computers/new{% endif %}">
  <label>Название</label><input name="name" value="{{ computer.name if computer else '' }}" required />
  <label>Описание</label><textarea name="description" required>{{ computer.description if computer else '' }}</textarea>
  <label>Цена</label><input name="price" type="number" step="0.01" value="{{ computer.price if computer else '' }}" required />
  <label>Процессор</label><input name="cpu" value="{{ computer.cpu if computer else '' }}" required />
  <label>Видеокарта</label><input name="gpu" value="{{ computer.gpu if computer else '' }}" />
  <label>ОЗУ (ГБ)</label><input name="ram_gb" type="number" value="{{ computer.ram_gb if computer else '' }}" required />
  <label>SSD (ГБ)</label><input name="ssd_gb" type="number" value="{{ computer.ssd_gb if computer else '' }}" required />
  <label>URL изображения</label><input name="image_url" type="url" value="{{ computer.image_url if computer else '' }}" required />
  <label>Название магазина</label><input name="shop_name" value="{{ computer.shop_name if computer else '' }}" required />
  <label>URL магазина</label><input name="shop_url" type="url" value="{{ computer.shop_url if computer else '' }}" required />
  <label>Категория</label>
  <select name="category_code" required>
    {% for code in categories %}
      <option value="{{ code }}" {% if computer and computer.category_code == code %}selected{% endif %}>{{ code }}</option>
    {% endfor %}
  </select>
  <label><input type="checkbox" name="has_windows" {% if not computer or computer.has_windows %}checked{% endif %} /> С Windows</label>
  <label><input type="checkbox" name="is_active" {% if not computer or computer.is_active %}checked{% endif %} /> Активен</label>
  <button class="btn primary" type="submit">Сохранить</button>
</form>
{% endblock %}
